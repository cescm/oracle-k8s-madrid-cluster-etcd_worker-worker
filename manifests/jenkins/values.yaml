controller:
  nodeSelector:
    kubernetes.io/hostname: madrid-cp-01
  admin:
    username: admin
    password: "CHANGEME_JENKINS_PASSWORD"
  serviceType: ClusterIP
  ingress:
    enabled: true
    apiVersion: networking.k8s.io/v1
    ingressClassName: nginx
    hostName: jenkins.example.com
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls:
      - secretName: jenkins-tls
        hosts:
          - jenkins.example.com
  persistence:
    enabled: true
    storageClass: local-path
    size: 50Gi
  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - configuration-as-code
agent:
  enabled: true
